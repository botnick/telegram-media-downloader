name: Notify Telegram

# Posts a message to the configured Telegram chat on:
#   - every push to main (commit summary)
#   - every published release (release notes, with a pre-release badge)
#
# Required repo secrets:
#   TELEGRAM_BOT_TOKEN  — bot token from @BotFather
#   TELEGRAM_CHAT_ID    — target chat id (-100... for channels)

on:
  push:
    branches: [main]
  release:
    types: [published]

jobs:
  notify-push:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Send commit notification
        env:
          TG_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TG_CHAT:  ${{ secrets.TELEGRAM_CHAT_ID }}
          REPO:     ${{ github.repository }}
          BRANCH:   ${{ github.ref_name }}
          ACTOR:    ${{ github.actor }}
          SHA:      ${{ github.sha }}
          MSG:      ${{ github.event.head_commit.message }}
        run: |
          set -e
          summary=$(printf '%s' "$MSG" | head -n1)
          summary_html=$(printf '%s' "$summary" | python3 -c 'import html,sys; print(html.escape(sys.stdin.read()))')
          text=$(printf '🚀 <b>Update</b>\n\n<b>Repo:</b> %s\n<b>Branch:</b> %s\n<b>By:</b> %s\n<b>Commit:</b> %s\n\n<a href="https://github.com/%s/commit/%s">View commit</a>' \
                  "$REPO" "$BRANCH" "$ACTOR" "$summary_html" "$REPO" "$SHA")
          curl -sS --fail-with-body -X POST "https://api.telegram.org/bot${TG_TOKEN}/sendMessage" \
            --data-urlencode "chat_id=${TG_CHAT}" \
            --data-urlencode "parse_mode=HTML" \
            --data-urlencode "disable_web_page_preview=true" \
            --data-urlencode "text=${text}"

  notify-release:
    if: github.event_name == 'release'
    runs-on: ubuntu-latest
    steps:
      - name: Send release notification
        env:
          TG_TOKEN:  ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TG_CHAT:   ${{ secrets.TELEGRAM_CHAT_ID }}
          REPO:      ${{ github.repository }}
          ACTOR:     ${{ github.actor }}
          REL_TAG:   ${{ github.event.release.tag_name }}
          REL_NAME:  ${{ github.event.release.name }}
          REL_URL:   ${{ github.event.release.html_url }}
          REL_BODY:  ${{ github.event.release.body }}
          REL_PRE:   ${{ github.event.release.prerelease }}
        run: |
          set -e
          if [ "$REL_PRE" = "true" ]; then badge="🧪 Pre-release"; else badge="🎉 New release"; fi
          title="${REL_NAME:-$REL_TAG}"
          title_html=$(printf '%s' "$title" | python3 -c 'import html,sys; print(html.escape(sys.stdin.read()))')
          # Trim release notes to fit Telegram's 4096-char limit comfortably,
          # then HTML-escape so markdown/raw-HTML in the body doesn't corrupt
          # the parser.
          body_html=$(printf '%s' "$REL_BODY" | head -c 3500 | python3 -c 'import html,sys; print(html.escape(sys.stdin.read()))')
          text=$(printf '%s: <b>%s</b>\n\n<b>Repo:</b> %s\n<b>Tag:</b> %s\n<b>By:</b> %s\n\n%s\n\n<a href="%s">View release</a>' \
                  "$badge" "$title_html" "$REPO" "$REL_TAG" "$ACTOR" "$body_html" "$REL_URL")
          curl -sS --fail-with-body -X POST "https://api.telegram.org/bot${TG_TOKEN}/sendMessage" \
            --data-urlencode "chat_id=${TG_CHAT}" \
            --data-urlencode "parse_mode=HTML" \
            --data-urlencode "disable_web_page_preview=true" \
            --data-urlencode "text=${text}"
