name: Notify Telegram Channel

on:
  push:
    branches:
      - main

  release:
    types:
      - published

  pull_request:
    types:
      - opened
      - closed
      - reopened
      - synchronize

jobs:
  notify:
    runs-on: ubuntu-latest

    steps:
      - name: Send Telegram notification
        run: |
          MESSAGE="🚀 <b>GitHub Update</b>%0A%0A"
          MESSAGE="${MESSAGE}<b>Repository:</b> ${{ github.repository }}%0A"
          MESSAGE="${MESSAGE}<b>Event:</b> ${{ github.event_name }}%0A"
          MESSAGE="${MESSAGE}<b>Actor:</b> ${{ github.actor }}%0A"
          MESSAGE="${MESSAGE}<b>Branch:</b> ${{ github.ref_name }}%0A"
          MESSAGE="${MESSAGE}<b>Commit:</b> <code>${{ github.sha }}</code>%0A"
          MESSAGE="${MESSAGE}%0Ahttps://github.com/${{ github.repository }}/commit/${{ github.sha }}"

          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d parse_mode="HTML" \
            -d disable_web_page_preview=true \
            -d text="$MESSAGE"
