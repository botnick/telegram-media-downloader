# Compose file for Telegram Media Downloader.
#
# Defaults to the prebuilt multi-arch image from GitHub Container Registry.
# `pull_policy: always` ensures `docker compose up -d` grabs the newest
# release each time — without this, an older locally-cached image wins and
# manifests as `Cannot find module '/app/src/web/server.js'` after upgrades.
#
# To build from source instead (for local dev), comment out `image:` +
# `pull_policy:` and uncomment `build:`.

services:
  telegram-downloader:
    image: ghcr.io/botnick/telegram-media-downloader:latest
    pull_policy: always
    # build: .
    container_name: telegram-downloader
    restart: unless-stopped
    ports:
      # Host port is `${TGDL_PORT}` (default 3000) — override in .env when
      # 3000 is already taken on the host (Grafana, common dev servers, etc.).
      # Container always listens on 3000.
      - "${TGDL_PORT:-3000}:3000"
    volumes:
      - ./data:/app/data
      # Example split-disk setup (uncomment + adjust paths):
      # - /mnt/ssd/tgdl/data:/app/data
      # - /mnt/hdd/tgdl/downloads:/mnt/hdd/downloads
    environment:
      - NODE_ENV=production
      - TZ=${TZ:-UTC}
      - TGDL_DEBUG=${TGDL_DEBUG:-}
      # V8 heap ceiling. Default 8 GiB so a 1M-row library doesn't trip
      # `FATAL ERROR: Reached heap limit Allocation failed` inside
      # better-sqlite3's `JS_all` on a fresh dedup / integrity sweep.
      # Override with `TGDL_HEAP_MB=2048` in .env for boxes with less
      # RAM (Pi 4, small Synology) — must stay strictly below the
      # container memory limit (`TGDL_MEM_LIMIT`) so the kernel doesn't
      # OOM-kill the process before V8 can recover.
      - NODE_OPTIONS=--max-old-space-size=${TGDL_HEAP_MB:-8192}
      # Default to trusting one hop of `X-Forwarded-For` because most
      # Docker deployments sit behind a reverse proxy (Caddy / Traefik /
      # nginx). Without this, express-rate-limit floods stderr with
      # `ERR_ERL_UNEXPECTED_X_FORWARDED_FOR` validation warnings on every
      # request. Override to a different value (loopback, uniquelocal, IP
      # list) or empty string to disable when running directly on the
      # host without a proxy.
      - TRUST_PROXY=${TRUST_PROXY:-1}
      # Auto-update wiring — only consulted when the `auto-update` profile
      # is enabled. With these set, Settings → Maintenance shows an
      # **Install update** button that hands the swap off to the watchtower
      # sidecar below. Tokens read from .env (see .env.example).
      - WATCHTOWER_URL=${WATCHTOWER_URL:-http://watchtower:8080}
      - WATCHTOWER_HTTP_API_TOKEN=${WATCHTOWER_HTTP_API_TOKEN:-}
      # Hardware-accelerated video thumbnails. Empty / unset = CPU only.
      # Set to `vaapi` (Intel iGPU + AMD on Linux), `qsv` (Intel Quick
      # Sync), `cuda` (NVIDIA), `videotoolbox` (macOS), or `d3d11va`
      # (Windows under WSL2) when the host has the matching driver AND
      # /dev/dri (Intel/AMD) or the nvidia runtime is wired up below. The
      # entrypoint detects the actual device GID at boot and aligns the
      # in-container `node` user with it — no manual group_add needed
      # even on Synology, where the GID drifts between DSM versions.
      - FFMPEG_HWACCEL=${FFMPEG_HWACCEL:-}
      # Set ENTRYPOINT_DEBUG_GPU=1 to log every detection step from the
      # entrypoint's GPU passthrough block (which device, which GID,
      # which group it joined). Quiet by default.
      - ENTRYPOINT_DEBUG_GPU=${ENTRYPOINT_DEBUG_GPU:-0}
      # NSFW classifier — HF token only needed for gated repos or to dodge
      # anonymous rate limits on first download. Every default model is
      # public; leave unset for typical use.
      - HF_TOKEN=${HF_TOKEN:-}
      - HUGGINGFACE_TOKEN=${HUGGINGFACE_TOKEN:-}
      - HUGGINGFACEHUB_API_TOKEN=${HUGGINGFACEHUB_API_TOKEN:-}
      # Face clustering sidecar URL. When the `faces` profile is enabled
      # (`docker compose --profile faces up`), the `tgdl-faces` service
      # below provides this endpoint and Node's `faces-spawn.js` skips
      # the local binary auto-spawn path entirely. Outside compose this
      # stays empty and Node falls back to the bundled PyInstaller
      # binary downloaded on first use.
      - FACES_SERVICE_URL=${FACES_SERVICE_URL:-http://tgdl-faces:8011}
      # Seekbar preview sidecar URL. Leave unset to let the dashboard
      # auto-spawn the bundled Go binary on a random localhost port;
      # set when running `seekbar-service/` as a separate compose
      # service. See seekbar-service/README.md for the standalone setup.
      - SEEKBAR_SIDECAR_URL=${SEEKBAR_SIDECAR_URL:-}
      - SEEKBAR_API_TOKEN=${SEEKBAR_API_TOKEN:-}
      # Split-disk setup: store downloads on a separate volume (e.g. HDD)
      # while keeping db.sqlite, sessions, and backups on a faster disk (SSD).
      # Set TGDL_DATA_DIR to the SSD path and TGDL_DOWNLOADS_DIR to the HDD
      # path, then add a second bind-mount under volumes: below.
      # - TGDL_DOWNLOADS_DIR=/mnt/hdd/downloads
    # GPU passthrough — uncomment the matching block for your host.
    #
    # Synology (DSM 6 / 7 with Intel iGPU): the device is at /dev/dri/renderD128
    # but its GID varies by DSM version (DSM 6 = 937, DSM 7 = 100, etc.).
    # The entrypoint auto-aligns the in-container `node` user with whatever
    # GID it sees, so you only need to mount the device — no group_add
    # required. Make sure SSH user has access (`sudo synogroup --add
    # videodriver $(whoami)`) so `docker compose up` can read it before
    # passthrough.
    #
    # Generic Linux (Intel iGPU / AMD): same — just mount /dev/dri.
    # NVIDIA: install nvidia-container-toolkit on the host and use
    # `runtime: nvidia` instead of `devices`.
    #
    # devices:
    #   - /dev/dri:/dev/dri
    # group_add:
    #   - "video"
    #   - "render"
    labels:
      # Marks this container as eligible for watchtower management. With
      # WATCHTOWER_LABEL_ENABLE=true on the watchtower service, ONLY
      # containers carrying this label can be touched — so the sidecar
      # can never accidentally recreate an unrelated app on the same host.
      - "com.centurylinklabs.watchtower.enable=true"
      # Tells the autoheal sidecar (below) to restart this container if its
      # healthcheck flips to "unhealthy" — covers the case where the process
      # is wedged but hasn't actually exited (Docker's `restart: unless-
      # stopped` only fires on a non-zero exit, not on a hang).
      - "autoheal=true"
    healthcheck:
      test: ["CMD", "node", "scripts/healthcheck.js"]
      interval: 30s
      timeout: 5s
      retries: 3
      # 30 s gives the cold-start path room for state-migration + first
      # WAL checkpoint on slow disks. Healthcheck failures during this
      # window don't count toward the retry budget.
      start_period: 30s
    # Resource ceiling — kicks in only on `docker compose up` (the `deploy`
    # key is honoured by Compose v2 even outside Swarm). 8 GiB matches the
    # default `NODE_OPTIONS=--max-old-space-size=8192` above so V8 hits
    # its heap limit gracefully (and recovers via GC) instead of getting
    # OOM-killed by the kernel mid-allocation. Smaller hosts: set
    # `TGDL_MEM_LIMIT=2g` AND `TGDL_HEAP_MB=1536` in .env so the heap
    # ceiling stays comfortably below the container limit.
    deploy:
      resources:
        limits:
          memory: ${TGDL_MEM_LIMIT:-8g}
        reservations:
          memory: 256m
    # Log rotation — without this, json-file logs grow forever and the host
    # disk fills up after a few weeks of debug output. 5 × 10 MB = 50 MB
    # ceiling per container, which is plenty to debug the most recent crash.
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"
        compress: "true"

  # Face clustering sidecar. THREE variants are available — pick the one
  # that matches your host's hardware:
  #
  #   CPU only (default; works everywhere):
  #     docker compose --profile faces up -d
  #
  #   NVIDIA CUDA (linux/amd64 host with nvidia-container-toolkit):
  #     docker compose --profile faces-cuda up -d
  #
  #   Intel OpenVINO (Intel iGPU / dGPU / NPU on linux/amd64):
  #     docker compose --profile faces-openvino up -d
  #
  # All three expose port 8011 inside the compose network so the main
  # app's `FACES_SERVICE_URL=http://tgdl-faces:8011` env var resolves
  # the same way regardless of which variant is running. Pick exactly
  # one — they'd race for the same DNS name and port. Outside compose
  # Node's faces-spawn.js auto-downloads the standalone PyInstaller
  # binary on first scan instead; the profile is for operators who'd
  # rather pull a prebuilt multi-arch image than pin a binary to the
  # host filesystem.
  #
  # The images are built by .github/workflows/release-faces-service.yml
  # and tagged `:latest` (CPU), `:cuda-latest`, `:openvino-latest`.
  # Watchtower picks them up via the label below.
  tgdl-faces:
    image: ghcr.io/botnick/tgdl-faces:latest
    pull_policy: always
    container_name: tgdl-faces
    restart: unless-stopped
    profiles: ["faces"]
    volumes:
      # Read-only mount of the downloads tree so path-mode detect
      # requests skip the base64 round-trip. The Node app POSTs paths
      # under /downloads which the allow-list below permits.
      # Mount the downloads tree at the SAME path the main app sees
      # (`/app/data/downloads`) so absolute paths produced by Node's
      # scan-runner work as-is in the sidecar — no Docker-specific path
      # remapping. Without this, every /detect call falls back to base64
      # transfer (CPU-bound on the Node side) because the sidecar's
      # ALLOW_ROOTS doesn't include the Node-side path prefix.
      - ./data/downloads:/app/data/downloads:ro
      # Persist the model cache outside the container so an image swap
      # doesn't re-download buffalo_l on first run. The Dockerfile
      # pre-bakes the model into the layer, but mounting the volume
      # means an operator-driven swap (different sidecar version,
      # custom model) is preserved across `docker compose pull` cycles.
      - ./data/faces-service/models:/root/.cache/tgdl-faces/models
    environment:
      - TGDL_FACES_HOST=0.0.0.0
      - TGDL_FACES_PORT=8011
      # Restrict path-mode reads to the downloads volume. Anything
      # outside this prefix is rejected with 403 and the Node side
      # falls back to base64.
      - TGDL_FACES_ALLOW_ROOTS=/app/data/downloads
      - TGDL_FACES_MODELS_DIR=/root/.cache/tgdl-faces/models
      # Inter-image sleep on CPU-only hosts. Set to 50–200 (ms) to cap
      # sustained CPU load between images in a batch so other processes
      # (downloader, OS) get breathing room. Leave at 0 (default) when a
      # GPU provider is active — GPU inference already leaves the CPU idle.
      - TGDL_FACES_THROTTLE_MS=${TGDL_FACES_THROTTLE_MS:-0}
      - TZ=${TZ:-UTC}
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8011/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      # Cold-start budget for the lazy buffalo_l load on Pi-class
      # hardware. /health itself responds instantly; the warm-up cost
      # lands on the first /detect call.
      start_period: 90s
    labels:
      # Same watchtower opt-in pattern as the main service so the
      # sidecar tracks `:latest` rebuilds without operator intervention.
      - "com.centurylinklabs.watchtower.enable=true"
    deploy:
      resources:
        # buffalo_l + insightface + onnxruntime peaks around 1.2 GB
        # resident on amd64 amid a scan burst; 2g default leaves
        # headroom. Override via TGDL_FACES_MEM_LIMIT for boxes with
        # tighter envelopes (Pi 4 4GB, small Synology).
        limits:
          memory: ${TGDL_FACES_MEM_LIMIT:-2g}
        reservations:
          memory: 512m
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"

  # CUDA variant of the faces sidecar. ENABLE WITH:
  #   docker compose --profile faces-cuda up -d
  #
  # Requires NVIDIA Container Toolkit on the host (install via
  # `apt-get install nvidia-container-toolkit` then `nvidia-ctk runtime
  # configure --runtime=docker && systemctl restart docker`). The image
  # is `ghcr.io/botnick/tgdl-faces:cuda-latest` — linux/amd64 only.
  #
  # Mutually exclusive with the `faces` and `faces-openvino` profiles —
  # they all bind container_name=tgdl-faces and port 8011 so Node's
  # FACES_SERVICE_URL=http://tgdl-faces:8011 resolves to whichever
  # variant is running. Compose refuses to bring up more than one.
  tgdl-faces-cuda:
    image: ghcr.io/botnick/tgdl-faces:cuda-latest
    pull_policy: always
    container_name: tgdl-faces
    restart: unless-stopped
    profiles: ["faces-cuda"]
    runtime: nvidia
    volumes:
      # Mount the downloads tree at the SAME path the main app sees
      # (`/app/data/downloads`) so absolute paths produced by Node's
      # scan-runner work as-is in the sidecar — no Docker-specific path
      # remapping. Without this, every /detect call falls back to base64
      # transfer (CPU-bound on the Node side) because the sidecar's
      # ALLOW_ROOTS doesn't include the Node-side path prefix.
      - ./data/downloads:/app/data/downloads:ro
      - ./data/faces-service/models:/root/.cache/tgdl-faces/models
    environment:
      - TGDL_FACES_HOST=0.0.0.0
      - TGDL_FACES_PORT=8011
      - TGDL_FACES_ALLOW_ROOTS=/app/data/downloads
      - TGDL_FACES_MODELS_DIR=/root/.cache/tgdl-faces/models
      # Default to auto-pick: sidecar will probe CUDA first, fall back
      # to CPU if the driver/runtime isn't usable inside the container.
      - TGDL_FACES_PROVIDERS=${TGDL_FACES_PROVIDERS:-auto}
      - NVIDIA_VISIBLE_DEVICES=${NVIDIA_VISIBLE_DEVICES:-all}
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
      # Throttle: 0 (default) is correct for GPU — CPU is idle between
      # kernel dispatches. Only raise this if falling back to CPU.
      - TGDL_FACES_THROTTLE_MS=${TGDL_FACES_THROTTLE_MS:-0}
      - TZ=${TZ:-UTC}
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8011/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 90s
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
    deploy:
      resources:
        # CUDA EP holds the model on GPU memory but onnxruntime still
        # stages tensors on the host side; 3g default covers RTX-class
        # cards with a buffalo_l preset. Override via the CUDA-specific
        # limit env var so the CPU variant's TGDL_FACES_MEM_LIMIT stays
        # smaller on the same host's compose.yml.
        limits:
          memory: ${TGDL_FACES_CUDA_MEM_LIMIT:-3g}
        reservations:
          memory: 1g
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"

  # OpenVINO variant of the faces sidecar. ENABLE WITH:
  #   docker compose --profile faces-openvino up -d
  #
  # Requires the host's Intel iGPU/dGPU/NPU exposed via /dev/dri (same
  # passthrough that ffmpeg vaapi uses) AND the operator's user inside
  # the container holding the render group GID. The default permission
  # set works on Synology DSM 7, recent Debian/Ubuntu, and Intel NUC
  # hosts. The image is `ghcr.io/botnick/tgdl-faces:openvino-latest`
  # — linux/amd64 only (OpenVINO doesn't ship arm64 wheels).
  tgdl-faces-openvino:
    image: ghcr.io/botnick/tgdl-faces:openvino-latest
    pull_policy: always
    container_name: tgdl-faces
    restart: unless-stopped
    profiles: ["faces-openvino"]
    devices:
      - /dev/dri:/dev/dri
    group_add:
      - "video"
      - "render"
    volumes:
      # Mount the downloads tree at the SAME path the main app sees
      # (`/app/data/downloads`) so absolute paths produced by Node's
      # scan-runner work as-is in the sidecar — no Docker-specific path
      # remapping. Without this, every /detect call falls back to base64
      # transfer (CPU-bound on the Node side) because the sidecar's
      # ALLOW_ROOTS doesn't include the Node-side path prefix.
      - ./data/downloads:/app/data/downloads:ro
      - ./data/faces-service/models:/root/.cache/tgdl-faces/models
    environment:
      - TGDL_FACES_HOST=0.0.0.0
      - TGDL_FACES_PORT=8011
      - TGDL_FACES_ALLOW_ROOTS=/app/data/downloads
      - TGDL_FACES_MODELS_DIR=/root/.cache/tgdl-faces/models
      - TGDL_FACES_PROVIDERS=${TGDL_FACES_PROVIDERS:-auto}
      - TGDL_FACES_THROTTLE_MS=${TGDL_FACES_THROTTLE_MS:-0}
      - TZ=${TZ:-UTC}
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8011/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 90s
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
    deploy:
      resources:
        limits:
          memory: ${TGDL_FACES_MEM_LIMIT:-2g}
        reservations:
          memory: 512m
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"

  # Auto-restart on hangs. Docker's `restart: unless-stopped` policy only
  # fires when the process *exits*; a wedged event loop, deadlocked DB
  # handle, or AI worker that hangs but doesn't crash leaves the container
  # running with healthcheck stuck on "unhealthy" indefinitely.
  #
  # `willfarrell/autoheal` polls the docker socket every AUTOHEAL_INTERVAL
  # seconds, finds containers whose health is "unhealthy" AND that carry
  # the AUTOHEAL_CONTAINER_LABEL ("autoheal=true"), and `docker restart`s
  # them. The label scoping means the sidecar can NEVER touch an unrelated
  # container on the same host even if it wanted to.
  #
  # Disabled-by-default: comment out this service if you'd rather rely on
  # an external supervisor (systemd, k8s, NAS health monitors, etc.).
  autoheal:
    image: willfarrell/autoheal:1.2.0
    container_name: telegram-downloader-autoheal
    restart: unless-stopped
    # autoheal only needs the docker socket — no inbound network. `none`
    # makes a hypothetical RCE in autoheal unable to phone home.
    network_mode: none
    environment:
      # Only restart containers explicitly opted-in via label. The main
      # service above carries `autoheal=true`.
      - AUTOHEAL_CONTAINER_LABEL=autoheal
      # Poll cadence — matches the dashboard healthcheck interval.
      - AUTOHEAL_INTERVAL=30
      # Don't act during the container's own start_period — gives boot
      # time without the sidecar racing the first healthcheck. Compose
      # already passes `start_period: 30s`; this is the upper bound.
      - AUTOHEAL_START_PERIOD=60
      # Graceful stop timeout before SIGKILL during a restart attempt.
      - AUTOHEAL_DEFAULT_STOP_TIMEOUT=10
      - TZ=${TZ:-UTC}
    volumes:
      # Read+write because autoheal calls `POST /containers/<id>/restart`.
      # If you need defence-in-depth against a compromised sidecar, swap
      # this for a docker-socket-proxy (tecnativa/docker-socket-proxy)
      # configured with CONTAINERS=1 + POST=1 and nothing else.
      - /var/run/docker.sock:/var/run/docker.sock
    logging:
      driver: "json-file"
      options:
        max-size: "1m"
        max-file: "3"

  # Optional one-click updater. ENABLE WITH:
  #   docker compose --profile auto-update up -d
  # Without the `--profile` flag the sidecar isn't started and the dashboard
  # falls back to "click the GitHub link and run docker compose up -d".
  #
  # Security model:
  #   - watchtower is the ONLY container that touches /var/run/docker.sock.
  #     The main app calls watchtower over the internal docker network via
  #     an HTTP token; it never sees the socket itself, so a hypothetical
  #     RCE in the dashboard cannot escalate to host root.
  #   - WATCHTOWER_LABEL_ENABLE=true scopes operations to ONLY the labeled
  #     telegram-downloader container — watchtower can't sweep up
  #     unrelated apps even if it wanted to.
  #   - HTTP API requires WATCHTOWER_HTTP_API_TOKEN (random hex). Set this
  #     in .env BEFORE first boot of the profile; absence disables the
  #     dashboard button entirely.
  watchtower:
    image: containrrr/watchtower:1.7.1
    profiles: ["auto-update"]
    container_name: telegram-downloader-updater
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      - WATCHTOWER_HTTP_API_UPDATE=true
      - WATCHTOWER_HTTP_API_TOKEN=${WATCHTOWER_HTTP_API_TOKEN:-}
      - WATCHTOWER_HTTP_API_PERIODIC_POLLS=false
      - WATCHTOWER_LABEL_ENABLE=true
      - WATCHTOWER_CLEANUP=true
      - WATCHTOWER_INCLUDE_RESTARTING=true
      - WATCHTOWER_NO_STARTUP_MESSAGE=true
      - TZ=${TZ:-UTC}

# First-time setup:
#   docker compose up -d
#   open http://localhost:3000 — set the dashboard password (only allowed
#   from localhost on first run), then go to Settings → Telegram Accounts
#   → Add account.
#
# Upgrade (manual):
#   docker compose up -d        # `pull_policy: always` re-pulls latest
#
# Upgrade (one-click in dashboard) — opt-in:
#   1. Generate a token:
#        openssl rand -hex 32   # or: node -e "console.log(require('crypto').randomBytes(32).toString('hex'))"
#   2. Add to .env (next to docker-compose.yml):
#        WATCHTOWER_HTTP_API_TOKEN=<the random token>
#   3. Boot with the auto-update profile:
#        docker compose --profile auto-update up -d
#   4. Settings → Maintenance → "Install update" — does the rest.
#
# Headless monitor (instead of web dashboard):
#   docker compose run --rm \
#     -e TGDL_RUN=monitor telegram-downloader node runner.js
#
# Interactive CLI:
#   docker compose run --rm telegram-downloader node src/index.js
